<!DOCTYPE html>
<html lang="cs">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DODOMAN</title>
  <style>
    /* System monospace font - full Czech diacritic support */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
      user-select: none;
    }

    .screen {
      display: none;
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    .screen.active {
      display: flex;
    }

    /* INTRO */
    #intro {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      overflow: hidden;
    }

    #intro-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0.18;
      filter: brightness(1.8) saturate(0.5);
    }

    #intro-content {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    /* Title */
    .game-title {
      display: inline-block;
      position: relative;
      padding: 16px 40px;
      margin-bottom: 50px;
    }

    .game-title-inner {
      position: relative;
      z-index: 2;
      font-family: 'Courier New', Courier, monospace;
      font-size: clamp(52px, 11vw, 130px);
      font-weight: 900;
      letter-spacing: 6px;
      color: #FFE600;
      text-shadow: 5px 5px 0 #C05000, -3px -3px 0 #C05000, 0 0 40px #FF9900, 0 0 80px rgba(255, 140, 0, .5);
      -webkit-text-stroke: 3px #8B4500;
    }

    .game-title::before {
      content: '';
      position: absolute;
      inset: -6px -12px;
      background: linear-gradient(160deg, #FF8C00, #D43000);
      border-radius: 6px;
      z-index: 1;
      box-shadow: 0 0 24px #FF6600, inset 0 2px 3px rgba(255, 255, 100, .25);
      border: 3px solid #FFE600;
    }

    .ld {
      color: #FF4400 !important;
    }

    .lo {
      color: #FFE600 !important;
    }

    .lm {
      color: #FF9900 !important;
    }

    .la {
      color: #FFCC00 !important;
    }

    .ln {
      color: #FF5500 !important;
    }

    /* Buttons */
    .btn {
      display: block;
      width: 340px;
      margin: 12px auto;
      padding: 16px 20px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 22px;
      cursor: pointer;
      border: none;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: transform .1s, box-shadow .1s;
      outline: none;
    }

    .btn:active {
      transform: translateY(3px);
    }

    .btn-play {
      background: linear-gradient(180deg, #FFE600, #FFA000);
      color: #1a0000;
      box-shadow: 0 5px 0 #7A3800, 0 0 16px rgba(255, 160, 0, .5);
      border: 3px solid #FFE600;
    }

    .btn-play:hover {
      box-shadow: 0 5px 0 #7A3800, 0 0 32px rgba(255, 200, 0, .8);
    }

    .btn-scores {
      background: linear-gradient(180deg, #00D4FF, #0060AA);
      color: #fff;
      box-shadow: 0 5px 0 #003366, 0 0 16px rgba(0, 150, 255, .4);
      border: 3px solid #00D4FF;
    }

    .btn-scores:hover {
      box-shadow: 0 5px 0 #003366, 0 0 32px rgba(0, 200, 255, .7);
    }

    .btn-danger {
      background: linear-gradient(180deg, #ff6666, #cc0000);
      color: #fff;
      box-shadow: 0 5px 0 #660000;
      border: 3px solid #ff6666;
    }

    /* Eidam logo — real image, no distortion */
    .eidam-logo {
      position: fixed;
      bottom: 12px;
      right: 12px;
      z-index: 999;
      width: 110px;
      height: 110px;
      cursor: pointer;
      transition: transform .15s;
      filter: drop-shadow(0 0 10px #FFC200);
    }

    .eidam-logo:hover {
      transform: scale(1.1);
    }

    .eidam-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: auto;
    }

    /* GAME */
    #game {
      flex-direction: row;
      align-items: stretch;
      background: #000;
    }

    #game-left {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #maze-canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* Sidebar */
    #sidebar {
      width: 170px;
      min-width: 150px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px 8px;
      background: #040418;
      border-left: 2px solid #1a1aff;
      justify-content: center;
      gap: 8px;
    }

    .sb-label {
      font-size: 16px;
      color: #5577aa;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    #dodo-real-wrap {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      height: 160px;
      overflow: hidden;
      border: 2px solid #2244aa;
      border-radius: 6px;
      background: #000;
      width: 120px;
    }

    #dodo-real-img {
      width: 100%;
      object-fit: cover;
      object-position: top;
      transition: height .4s ease;
    }

    #player-label {
      font-size: 18px;
      color: #4af;
      letter-spacing: 2px;
    }

    #score-cm {
      font-size: 26px;
      color: #FFE600;
      text-shadow: 0 0 8px #FF8C00;
    }

    #timer-display {
      font-size: 36px;
      color: #ff4444;
      text-shadow: 0 0 10px #ff0000;
      letter-spacing: 2px;
    }

    #timer-display.warning {
      animation: blink .5s infinite;
    }

    @keyframes blink {
      50% {
        opacity: .3;
      }
    }

    /* GAMEOVER */
    #gameover {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, .97);
    }

    #gameover h2 {
      font-size: clamp(28px, 4vw, 48px);
      margin-bottom: 24px;
      text-align: center;
      line-height: 1.6;
      max-width: 600px;
      padding: 0 20px;
      font-weight: bold;
    }

    #gameover h2.won {
      color: #FFE600;
      text-shadow: 0 0 20px #FF8C00;
    }

    #gameover h2.lost {
      color: #ff5555;
      text-shadow: 0 0 20px #ff0000;
    }

    #gameover .btn {
      font-size: 15px;
      width: 280px;
      padding: 12px 16px;
    }

    #nickname-input {
      font-family: 'Courier New', Courier, monospace;
      font-size: 22px;
      padding: 10px 14px;
      margin-bottom: 14px;
      background: #111;
      color: #FFE600;
      border: 2px solid #FFE600;
      outline: none;
      width: 280px;
      text-align: center;
      letter-spacing: 2px;
    }

    #final-score-display {
      font-size: 20px;
      color: #aaa;
      margin-bottom: 18px;
    }

    /* LEADERBOARD */
    #leaderboard {
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 32px 16px;
      background: #000;
      overflow-y: auto;
    }

    #leaderboard h1 {
      font-size: clamp(22px, 4vw, 42px);
      color: #FFE600;
      text-shadow: 0 0 20px #FF8C00;
      margin-bottom: 28px;
      text-align: center;
    }

    #scores-table {
      width: 100%;
      max-width: 600px;
      border-collapse: collapse;
    }

    #scores-table th {
      font-size: 18px;
      color: #4af;
      padding: 10px 14px;
      border-bottom: 2px solid #1a2255;
      text-align: left;
      letter-spacing: 1px;
    }

    #scores-table td {
      font-size: 18px;
      padding: 10px 14px;
      border-bottom: 1px solid #0d0d22;
      color: #ddd;
    }

    #scores-table tr:nth-child(1) td {
      color: #FFE600 !important;
      font-size: 20px;
    }

    #scores-table tr:nth-child(2) td {
      color: #C0C0C0 !important;
    }

    #scores-table tr:nth-child(3) td {
      color: #CD7F32 !important;
    }
  </style>
</head>

    // ---- Online žebříček přes JSONBin.io ----
    // Vytvoř si zdarma účet na jsonbin.io, vlož BIN ID a API KEY níže:
    const JSONBIN_BIN_ID = '6a32f204f5f4af5e2903f29c';   // např. '6123abc...'
    const JSONBIN_API_KEY = '$2a$10$YoqnNj54Jm6cSG10sxhdieONrks/cg//Ae2W/Xe3n9q3c/QfbGKMi'; // X-Master-Key z jsonbin.io

    async function getScores() {
      // Fallback na localStorage pokud není nastaveno JSONBin
      if (JSONBIN_BIN_ID === 'TVOJE_BIN_ID') {
        try { return JSON.parse(localStorage.getItem('dodoman_hi') || '[]'); } catch (e) { return []; }
      }
      try {
        const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
          headers: { 'X-Master-Key': JSONBIN_API_KEY }
        });
        const data = await r.json();
        return data.record?.scores || [];
      } catch (e) {
        console.warn('JSONBin load failed, using localStorage', e);
        try { return JSON.parse(localStorage.getItem('dodoman_hi') || '[]'); } catch (e2) { return []; }
      }
    }

    async function saveScores(arr) {
      // Fallback na localStorage pokud není nastaveno JSONBin
      if (JSONBIN_BIN_ID === 'TVOJE_BIN_ID') {
        localStorage.setItem('dodoman_hi', JSON.stringify(arr));
        return;
      }
      try {
        await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-Master-Key': JSONBIN_API_KEY
          },
          body: JSON.stringify({ scores: arr })
        });
        // Záloha i lokálně
        localStorage.setItem('dodoman_hi', JSON.stringify(arr));
      } catch (e) {
        console.warn('JSONBin save failed, using localStorage', e);
        localStorage.setItem('dodoman_hi', JSON.stringify(arr));
      }
    }

      document.getElementById('scores-tbody').innerHTML = scores.length

    }

      const el = document.getElementById('timer-display');
      el.textContent = timeLeft + 's';
      if (timeLeft <= 10) el.classList.add('warning'); else el.classList.remove('warning');
      if (timeLeft <= 0) endGame();
    }

    function spawnNiva() {
      if (!gameRunning) return;
      // Collect all remaining dots
      let dots = [];
      for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (maze[r][c] === 0) dots.push({ r, c });
      if (!dots.length) return;

      // Spawn 2-3 niva sýrů najednou
      let count = 2 + Math.floor(Math.random() * 2);

      // Priority: cells that are 1-4 steps ahead in current direction
      let ahead = [];
      for (let step = 1; step <= 4; step++) {
        let ac = ((Math.round(player.col) + dir.x * step) % COLS + COLS) % COLS;
        let ar = Math.round(player.row) + dir.y * step;
        if (ar >= 0 && ar < ROWS && maze[ar][ac] === 0) ahead.push({ r: ar, c: ac });
      }
      // Also add dots that are close (dist 1-3) as fallback
      let nearby = dots.filter(d => {
        let dist = Math.abs(d.r - player.row) + Math.abs(d.c - player.col);
        return dist >= 1 && dist <= 3;
      });

      let pool = [...ahead, ...nearby, ...dots];
      // Deduplicate
      let seen = new Set();
      pool = pool.filter(d => { let k = d.r * 100 + d.c; if (seen.has(k)) return false; seen.add(k); return true; });

      for (let i = 0; i < count && i < pool.length; i++) {
        let p = pool[i];
        let key = p.r * 100 + p.c;
        if (!nivaSet.has(key)) {
          nivaSet.add(key);
          // Auto-expire after 2.5s so it disappears if not eaten
          let t = setTimeout(() => nivaSet.delete(key), 2500);
          nivaCleanups.push(t);
        }
      }
    }

    document.addEventListener('keydown', e => {
      if (!gameRunning) return;
      const map = { 'ArrowLeft': { x: -1, y: 0 }, 'ArrowRight': { x: 1, y: 0 }, 'ArrowUp': { x: 0, y: -1 }, 'ArrowDown': { x: 0, y: 1 } };
      if (map[e.key]) { nextDir = map[e.key]; e.preventDefault(); }
    });
    let touchSt = null;
    document.addEventListener('touchstart', e => { touchSt = e.touches[0]; }, { passive: true });
    document.addEventListener('touchend', e => {
      if (!touchSt || !gameRunning) return;
      let dx = e.changedTouches[0].clientX - touchSt.clientX, dy = e.changedTouches[0].clientY - touchSt.clientY;
      if (Math.abs(dx) > Math.abs(dy)) nextDir = dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 };
      else nextDir = dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 };
    }, { passive: true });

    // ---- Grid-based movement (classic Pac-Man style) ----
    // Player position is always fractional between two integer grid cells.
    // We check walls only at integer cell boundaries.

    function cellWalkable(c, r) {
      // Tunnel wrap
      c = ((c % COLS) + COLS) % COLS;
      if (r < 0 || r >= ROWS) return false;
      return maze[r][c] !== 1;
    }

    function movePlayer(dt) {
      const sp = SPEED * dt; // pohyb v buňkách za tento snímek

      // Snap threshold: how close to a grid center before we allow turning
      const snap = 0.15;

      // Are we aligned enough on the axis perpendicular to movement to try a turn?
      let alignedRow = Math.abs(player.row - Math.round(player.row)) < snap;
      let alignedCol = Math.abs(player.col - Math.round(player.col)) < snap;

      // Try buffered turn when aligned
      if (nextDir.x !== 0 && alignedRow) {
        let tc = Math.round(player.col) + nextDir.x;
        let tr = Math.round(player.row);
        if (cellWalkable(tc, tr)) {
          dir = nextDir;
          player.row = Math.round(player.row); // snap perp axis
        }
      }
      if (nextDir.y !== 0 && alignedCol) {
        let tc = Math.round(player.col);
        let tr = Math.round(player.row) + nextDir.y;
        if (cellWalkable(tc, tr)) {
          dir = nextDir;
          player.col = Math.round(player.col); // snap perp axis
        }
      }

      // Move in current direction
      let nc = player.col + dir.x * sp;
      let nr = player.row + dir.y * sp;

      // Tunnel wrap
      if (nc < 0) nc += COLS;
      if (nc >= COLS) nc -= COLS;

      // Wall check: look at the cell we're moving into
      let fc = dir.x > 0 ? Math.floor(nc + 0.5) : dir.x < 0 ? Math.ceil(nc - 0.5) : Math.round(nc);
      let fr = dir.y > 0 ? Math.floor(nr + 0.5) : dir.y < 0 ? Math.ceil(nr - 0.5) : Math.round(nr);
      fc = ((fc % COLS) + COLS) % COLS;

      if (cellWalkable(fc, fr)) {
        player.col = nc;
        player.row = nr;
      } else {
        // Stop and snap to grid center
        if (dir.x !== 0) player.col = Math.round(player.col);
        if (dir.y !== 0) player.row = Math.round(player.row);
      }

      // Eat dot at nearest grid cell
      let gr = Math.round(player.row);
      let gc = ((Math.round(player.col)) % COLS + COLS) % COLS;
      if (gr >= 0 && gr < ROWS && maze[gr][gc] === 0) {
        let dist = Math.abs(player.col - gc) + Math.abs(player.row - gr);
        if (dist < 0.5) {
          let key = gr * 100 + gc;
          if (nivaSet.has(key)) { score -= 1; nivaSet.delete(key); } else score += 0.5;
          maze[gr][gc] = 2;
          updateSidebar();
        }
      }
    }

    function updateSidebar() {
      let cm = 150 + score;
      document.getElementById('score-cm').textContent = cm.toFixed(1) + ' cm';
      let h = Math.max(30, Math.min(155, 90 + score * 1.8));
      document.getElementById('dodo-real-img').style.height = h + 'px';
    }

    function draw() {
      const canvas = document.getElementById('maze-canvas'), ctx = canvas.getContext('2d'), cs = cellSz;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          let x = c * cs, y = r * cs, v = maze[r][c];
          if (v === 1) {
            ctx.fillStyle = '#1515cc'; ctx.fillRect(x, y, cs, cs);
            ctx.strokeStyle = '#3333ff'; ctx.lineWidth = 1.5; ctx.strokeRect(x + 1.5, y + 1.5, cs - 3, cs - 3);
          } else if (v === 0) {
            let key = r * 100 + c;
            // Draw cheese - use 'lighten' blend to knock out black background
            let sz = cs * 0.85;
            let ox = x + (cs - sz) / 2, oy = y + (cs - sz) / 2;
            if (nivaSet.has(key)) {
              ctx.save();
              ctx.globalCompositeOperation = 'lighten';
              ctx.drawImage(nivaCanvas, ox, oy, sz, sz);
              ctx.restore();
            } else {
              if (syrImg.complete && syrImg.naturalWidth > 0) {
                ctx.save();
                ctx.globalCompositeOperation = 'lighten';
                ctx.drawImage(syrImg, ox, oy, sz, sz);
                ctx.restore();
              }
            }
          }
        }
      }
      drawDodo(ctx);
    }

    function drawDodo(ctx) {
      let cs = cellSz;
      let cx = (player.col + 0.5) * cs;
      let cy = (player.row + 0.5) * cs;
      let r = cs * 0.58;

      ctx.save();
      ctx.translate(cx, cy);

      // Výchozí stav obrázku: zobák míří DOLEVA.
      // Každý frame začínáme od nuly a aplikujeme JEDNU transformaci:
      //   doleva  → žádná transformace
      //   doprava → zrcadlení scale(-1, 1)  [NErotujeme, aby nebyl vzhůru nohama]
      //   nahoru  → rotate(-90°)
      //   dolů    → rotate(+90°)
      if (dir.x === -1) {
        // doleva — výchozí stav
      } else if (dir.x === 1) {
        // doprava — pouze zrcadlení
        ctx.scale(-1, 1);
      } else if (dir.y === -1) {
        // nahoru
        ctx.rotate(Math.PI / 2);
      } else {
        // dolů
        ctx.rotate(-Math.PI / 2);
      }

      // Ořez do kruhu
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.clip();

      // Kresba obrázku — zobák je vždy vlevo v lokálních souřadnicích
      if (dodoImg.complete && dodoImg.naturalWidth > 0) {
        ctx.drawImage(dodoImg, -r, -r, r * 2, r * 2);
      } else {
        ctx.fillStyle = '#4488ff';
        ctx.fillRect(-r, -r, r * 2, r * 2);
      }

      // Animace pusy: klín vždy na LEVÉ straně (kde je zobák) = Math.PI
      // Pro zrcadlený případ (doprava) je scale(-1,1) aplikován, takže
      // Math.PI v lokálních souřadnicích stále odpovídá zobáku.
      if (mouthOpen) {
        let mA = 0.28 * Math.PI;
        ctx.fillStyle = 'rgba(0,0,0,.9)';
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, r + 2, Math.PI - mA, Math.PI + mA);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();

      // Glow ring
      ctx.save();
      ctx.shadowColor = 'rgba(80,160,255,.5)'; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(100,180,255,.35)'; ctx.lineWidth = 2; ctx.stroke();
      ctx.restore();
    }

    let lastTime = 0;
    function loop(timestamp) {
      if (!gameRunning) return;
      raf = requestAnimationFrame(loop);
      const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
      lastTime = timestamp;
      mouthTick += dt;
      if (mouthTick >= 0.3) { mouthOpen = !mouthOpen; mouthTick = 0; }
      movePlayer(dt); draw();
    }

    async function endGame() {
      gameRunning = false; clearInterval(timerInt); clearInterval(nivaSpawnInt); cancelAnimationFrame(raf);
      let cm = 150 + score;
      // Zobraz loading stav
      showScreen('gameover');
      document.getElementById('gameover-msg').className = '';
      document.getElementById('gameover-msg').innerHTML = '\u23F3 Nahrávám žebříček...';
      document.getElementById('final-score-display').textContent = '';
      const scores = await getScores();
      const worstTop = scores.length > 0 ? scores[scores.length - 1].pts : -Infinity;
      const isTop = scores.length < 10 || score > worstTop;
      document.getElementById('final-score-display').textContent = 'V\u00fdsledek: ' + cm.toFixed(1) + ' cm';
      if (isTop) {
        if (cm > 150) {
          document.getElementById('gameover-msg').className = 'won';
          document.getElementById('gameover-msg').innerHTML = '\u{1F389} Pod\u00e1\u0159ilo se ti<br>zv\u00fd\u0161it Doda! \u{1F389}';
        } else {
          document.getElementById('gameover-msg').className = 'lost';
          document.getElementById('gameover-msg').innerHTML = '\u{1F641} Pod\u00e1\u0159ilo se ti<br>Doda zmen\u0161it...';
        }
        document.getElementById('nickname-input').style.display = 'block';
        document.getElementById('nickname-input').value = '';
        document.getElementById('gameover-btn').textContent = '\u{1F4BE} Zapsat do \u017eeb\u0159\u00ed\u010dku';
      } else {
        if (cm > 150) {
          document.getElementById('gameover-msg').className = 'lost';
          document.getElementById('gameover-msg').innerHTML = '\u{1F622} D\u00edky tob\u011b z\u016fstane<br>st\u00e1le mal\u00fd...';
        } else {
          document.getElementById('gameover-msg').className = 'lost';
          document.getElementById('gameover-msg').innerHTML = '\u{1F641} Pod\u00e1\u0159ilo se ti<br>Doda zmen\u0161it...';
        }
        document.getElementById('nickname-input').style.display = 'none';
        document.getElementById('gameover-btn').textContent = '\u2199 Zp\u011bt na \u00favod';
      }
    }

    async function gameoverAction() {
      const scores = await getScores();
      const worstTop = scores.length > 0 ? scores[scores.length - 1].pts : -Infinity;
      const isTop = scores.length < 10 || score > worstTop;
      if (isTop && document.getElementById('nickname-input').style.display !== 'none') {
        let name = (document.getElementById('nickname-input').value.trim().toUpperCase() || 'ANONYM').slice(0, 16);
        let d = new Date(), dateStr = d.toLocaleDateString('cs-CZ');
        scores.push({ name, date: dateStr, cm: (150 + score).toFixed(1), pts: score.toFixed(1) });
        scores.sort((a, b) => b.pts - a.pts); scores.splice(10);
        document.getElementById('gameover-btn').textContent = '\u23F3 Ukládám...';
        await saveScores(scores);
        showLeaderboard();
      } else showScreen('intro');
    }

    showScreen('intro');
  </script>
</body>
